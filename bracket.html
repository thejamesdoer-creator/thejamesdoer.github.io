/* ── Slot component ── */
function Slot({ seed, name, winner, accent }) {
return (
<div style={{
display:“flex”, alignItems:“center”, gap:“4px”,
background: winner ? `${accent}18` : “rgba(255,255,255,0.025)”,
border: winner ? `1px solid ${accent}55` : “1px solid #1e2535”,
borderRadius:“4px”,
padding:“3px 6px”,
minWidth:“118px”,
height:“24px”,
}}>
{seed !== undefined && (
<span style={{ fontSize:“0.58rem”, color:”#c9a96e”, minWidth:“13px”, fontWeight:“bold” }}>{seed}</span>
)}
<span style={{
fontSize:“0.7rem”,
color: winner ? “#fff” : “#707888”,
fontWeight: winner ? “bold” : “normal”,
whiteSpace:“nowrap”, overflow:“hidden”, textOverflow:“ellipsis”,
flex:1,
}}>{name}</span>
{winner && <span style={{ fontSize:“0.52rem”, color:accent, marginLeft:“2px” }}>✓</span>}
</div>
);
}

function ConnectorH({ accent }) {
return <div style={{ width:“10px”, height:“1px”, background:`${accent}35`, flexShrink:0 }} />;
}

/* ── Region bracket (left→right horizontal) ── */
function RegionBracket({ name, data }) {
const ac = data.color;
const { r1, r2, s16, e8, champ, upset } = data;
// pairs of R1 slots
const pairs = [];
for (let i = 0; i < 16; i += 2) pairs.push([r1[i], r1[i+1]]);
// R2 matchups (winners of consecutive pairs)
const r2m = [[r2[0],r2[1]],[r2[2],r2[3]],[r2[4],r2[5]],[r2[6],r2[7]]];
const s16m = [[s16[0],s16[1]],[s16[2],s16[3]]];
const e8m = [e8[0], e8[1]];

const col = { display:“flex”, flexDirection:“column”, flexShrink:0 };

return (
<div style={{ marginBottom:“1.5rem” }}>
{/* Header */}
<div style={{ display:“flex”, alignItems:“center”, gap:“0.5rem”, marginBottom:“0.5rem”, paddingLeft:“0.75rem” }}>
<div style={{ width:“3px”, height:“16px”, background:ac, borderRadius:“2px” }} />
<span style={{ color:ac, fontWeight:“bold”, fontSize:“0.88rem” }}>{name}</span>
<span style={{ color:”#607080”, fontSize:“0.75rem” }}>
→ <strong style={{color:ac}}>{champ}</strong>
</span>
<span style={{ marginLeft:“auto”, fontSize:“0.65rem”, color:”#607080”, paddingRight:“0.75rem” }}>
⚡ {upset}
</span>
</div>

fontSize:“0.9rem”, fontWeight: isChamp||isRunner ? “bold” : “normal”,
color: isChamp ? “#FFD700” : isRunner ? “#4a9eff” : “#c0c8d4”,
marginBottom:“0.4rem”,
}}>
{team}{isChamp ? “ 🏆” : isRunner ? “ 🥈” : “”}
</div>
);
};

return (
